<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Endereço</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Buscar Endereço</h1>
        <input type="text" id="cep" placeholder="Digite o CEP (ex: 01001000)" maxlength="8">
        <button onclick="buscarEndereco()">Pesquisar</button>

        <div id="resultado" class="hidden">
            <p><strong>Logradouro:</strong> <span id="rua">...</span></p>
            <p><strong>Bairro:</strong> <span id="bairro">...</span></p>
            <p><strong>Cidade:</strong> <span id="cidade">...</span></p>
            <p><strong>Estado:</strong> <span id="estado">...</span></p>
            <p><strong>CEP:</strong> <span id="cep-resultado">...</span></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
